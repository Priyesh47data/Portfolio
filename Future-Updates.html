<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Coming Soon</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

/* Container */

.container{
  max-width:600px;
}

/* Icon animation */

.icon{
  font-size:70px;
  margin-bottom:20px;
  animation: float 2s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
  100%{transform:translateY(0)}
}

/* Heading */

h1{
  font-size:36px;
  margin-bottom:10px;
}

/* Text */

p{
  color:#cbd5e1;
  font-size:16px;
  margin-bottom:30px;
}

/* Button */

.back-btn{
  display:inline-block;
  padding:12px 24px;
  border-radius:6px;
  text-decoration:none;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:600;
  transition:.3s;
}

.back-btn:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 20px rgba(59,130,246,0.7),
             0 0 40px rgba(6,182,212,0.4);
}

</style>
</head>

<body>

<div class="container">

<div class="icon">🚧</div>

<h1>Project Coming Soon</h1>

<p>
This project page is currently under development.  
I’m working on adding the full project details, datasets, and dashboards.  
Please check back soon!
</p>

← Back to Portfolio
</a>

</div>

</body>
</html>
